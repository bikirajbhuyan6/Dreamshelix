kind = "web"
previewPath = "/"
title = "Dreamshelix India"
version = "1.0.0"
id = "artifacts/dreamshelix"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21408
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/dreamshelix run dev"

[services.env]
PORT = "21408"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/dreamshelix", "run", "build"]
publicDir = "artifacts/dreamshelix/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
