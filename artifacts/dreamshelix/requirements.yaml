  - path: "artifacts/dreamshelix/public/images/abstract-shape-1.png"
    description: "Floating 3D glass sphere with purple internal glow, dark background, transparent png style"
    aspect_ratio: "1:1"
  - path: "artifacts/dreamshelix/public/images/abstract-shape-2.png"
    description: "Floating 3D glass torus with orange and pink internal glow, dark background, transparent png style"
    aspect_ratio: "1:1"
  - path: "artifacts/dreamshelix/public/images/logo.png"
    description: "Premium EdTech logo mark, letter D and H intertwined like a DNA helix, deep purple and orange gradient, modern minimalist vector, dark background"
