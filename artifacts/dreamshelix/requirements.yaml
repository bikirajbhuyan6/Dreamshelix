packages:
  "framer-motion": "For advanced page transitions, scroll effects, and micro-interactions"
  "recharts": "For rendering beautiful analytics charts in the admin and student dashboards"
  "date-fns": "For formatting timestamps and dates elegantly"
  "jwt-decode": "To decode JWT tokens for role-based routing"
  "zustand": "For lightweight global auth and UI state management"
  "clsx": "For conditional class name merging"
  "tailwind-merge": "For merging tailwind classes safely"

images:
